kind = "web"
previewPath = "/"
title = "SwiftShip Logistics"
version = "1.0.0"
id = "artifacts/logistics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24024

[services.development]
run = "pnpm --filter @workspace/logistics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/logistics", "run", "build" ]
publicDir = "artifacts/logistics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24024"
BASE_PATH = "/"
